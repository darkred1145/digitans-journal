<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digitan's Journal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1b2e;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .header img { width: 48px; height: 48px; border-radius: 8px; }
    .header h1 { font-size: 18px; font-weight: 600; color: #fff; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 13px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-dot.connected { background: #43b581; }
    .status-dot.disconnected { background: #f04747; }
    .status-dot.connecting { background: #faa61a; }
    .info { font-size: 12px; color: #999; margin-bottom: 16px; }
    .activity { background: #232540; border-radius: 8px; padding: 12px; margin-bottom: 16px; }
    .activity h3 { font-size: 14px; color: #fff; margin-bottom: 4px; }
    .activity p { font-size: 12px; color: #aaa; }
    .activity .empty { color: #666; font-style: italic; }
    .btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #5865f2;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
    }
    .btn:hover { background: #4752c4; }
    .btn:active { background: #3c45a5; }
    .hint { font-size: 11px; color: #666; margin-top: 8px; text-align: center; }
    .error { font-size: 11px; color: #f04747; margin-top: 8px; text-align: center; word-break: break-all; display: none; }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon128.png" alt="Digitan's Journal">
    <h1>Digitan's Journal</h1>
  </div>
  <div class="status">
    <span class="status-dot disconnected" id="statusDot"></span>
    <span id="statusText">Disconnected</span>
  </div>
  <div class="info">
    <span id="userIdInfo"></span>
  </div>
  <div class="activity" id="activityContainer">
    <h3>Current Activity</h3>
    <p class="empty" id="activityEmpty">No activity</p>
    <div id="activityContent" style="display:none"></div>
  </div>
  <button class="btn" id="reconnectBtn">Reconnect</button>
  <button class="btn" id="clearBtn" style="margin-top:8px;background:#3a3c56">Clear Activity</button>
  <div class="error" id="errorMsg"></div>
  <div class="hint">
    Requires: Native Host installed, Discord app running
  </div>
  <script src="popup.js"></script>
</body>
</html>
