<!DOCTYPE html>
<html lang="en" style="color-scheme:dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digitan's Journal</title>
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0C0A14;
      --surface: #181424;
      --border: #2A223A;
      --border-light: #3A3050;
      --text: #EDE0D0;
      --text-secondary: #9B8FA8;
      --text-muted: #63597A;
      --accent: #F37F96;
      --accent-sub: #F9F189;
      --accent-green: #6CD4A0;
      --accent-amber: #F0A345;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: var(--font-body);
      font-size: 13px;
      background:
        radial-gradient(ellipse 140% 80% at 50% -20%, rgba(243,127,150,0.04) 0%, transparent 60%),
        var(--bg);
      color: var(--text);
      padding: 16px 16px 12px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
    }

    .title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      font-style: italic;
      color: var(--text);
      letter-spacing: -0.4px;
      line-height: 1.3;
    }

    .status-line {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
      min-height: 18px;
    }

    .status-text {
      font-size: 11px;
      color: var(--text-muted);
      transition: color 0.3s;
    }
    .status-text.connected { color: var(--accent-green); }
    .status-text.disconnected { color: var(--text-muted); }
    .status-text.connecting { color: var(--accent-amber); }

    /* ── Wax Seal ── */
    .seal {
      position: relative;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .seal-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background:
        radial-gradient(circle at 40% 35%, rgba(255,255,255,0.06) 0%, transparent 50%),
        radial-gradient(circle at 60% 70%, rgba(0,0,0,0.15) 0%, transparent 50%);
      box-shadow:
        inset 0 1px 3px rgba(0,0,0,0.5),
        0 1px 2px rgba(0,0,0,0.3);
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    .seal-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      position: relative;
      z-index: 1;
      transition: background 0.4s, box-shadow 0.4s;
      background: var(--text-muted);
    }
    .seal-dot.connecting { background: var(--accent-amber); animation: pulse-amber 1.5s ease-in-out infinite; }
    .seal-dot.connected { background: var(--accent-green); animation: pulse-green 2s ease-in-out infinite; }
    .seal[data-status="connected"] .seal-ring { border-color: rgba(108,212,160,0.3); box-shadow: inset 0 0 8px rgba(108,212,160,0.15), 0 0 4px rgba(108,212,160,0.1); }
    .seal[data-status="connecting"] .seal-ring { border-color: rgba(240,163,69,0.3); box-shadow: inset 0 0 8px rgba(240,163,69,0.15), 0 0 4px rgba(240,163,69,0.1); }

    @media (prefers-reduced-motion: reduce) {
      .seal-dot.connecting, .seal-dot.connected { animation: none; }
    }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(108,212,160,0.35); }
      50% { box-shadow: 0 0 0 6px rgba(108,212,160,0); }
    }
    @keyframes pulse-amber {
      0%, 100% { box-shadow: 0 0 0 0 rgba(240,163,69,0.35); }
      50% { box-shadow: 0 0 0 6px rgba(240,163,69,0); }
    }

    /* ── Washi Tape (journal divider) ── */
    .ruled {
      position: relative;
      margin-bottom: 12px;
      padding-top: 12px;
    }
    .ruled::before {
      content: '';
      display: block;
      height: 1px;
      background: var(--accent-sub);
      opacity: 0.5;
    }
    .ruled::after {
      content: '';
      position: absolute;
      top: 5px;
      left: 50%;
      width: 3px;
      height: 3px;
      margin-left: -1.5px;
      border-radius: 50%;
      background: var(--accent-sub);
      opacity: 0.3;
    }

    /* ── Entry ── */
    .entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 12px;
    }

    .entry-message {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .entry-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .entry-site {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .entry-details {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
      word-wrap: break-word;
    }

    .entry-state {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* ── Footer info ── */
    .footer-info {
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 10px;
      font-family: var(--font-mono);
      word-break: break-all;
    }
    .footer-info.error {
      color: var(--accent);
    }

    /* ── Actions ── */
    .actions {
      display: flex;
      gap: 8px;
      margin-bottom: 2px;
    }

    .btn {
      flex: 1;
      padding: 7px 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--text-secondary);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn:hover { background: var(--surface); color: var(--text); border-color: var(--border-light); }
    .btn:active { background: var(--border); }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { color: var(--accent); border-color: rgba(243,127,150,0.3); }
    .btn-primary:hover { background: rgba(243,127,150,0.1); border-color: var(--accent); }

    /* ── Shortcut hint ── */
    .hint {
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="title">Digitan's Journal</h1>
    <div class="seal" id="seal" data-status="disconnected">
      <div class="seal-dot disconnected" id="sealDot"></div>
      <div class="seal-ring"></div>
    </div>
  </header>

  <div class="status-line">
    <span class="status-text disconnected" id="statusText">Disconnected</span>
  </div>

  <div class="ruled">
    <div class="entry" id="activityContainer">
      <div id="emptyState">
        <p class="entry-message" id="emptyMessage">Your journal is ready.</p>
        <p class="entry-hint" id="emptyHint">Open a tracked site to begin logging.</p>
      </div>
      <div id="activeEntry" style="display:none">
        <p class="entry-site" id="entrySite"></p>
        <p class="entry-details" id="entryDetails"></p>
        <p class="entry-state" id="entryState"></p>
      </div>
    </div>
  </div>

  <div class="footer-info" id="footerInfo"></div>

  <div class="actions">
    <button class="btn btn-primary" id="reconnectBtn">Reconnect</button>
    <button class="btn" id="clearBtn">Clear</button>
  </div>

  <div class="hint">Alt + C to clear</div>

  <script src="popup.js"></script>
</body>
</html>
